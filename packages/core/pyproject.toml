[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "am-i-blocked-core"
version = "0.1.0"
description = "Shared models, enums, and utilities for am-i-blocked"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "structlog>=24.0",
]

[tool.hatch.build.targets.wheel]
packages = ["am_i_blocked_core"]
