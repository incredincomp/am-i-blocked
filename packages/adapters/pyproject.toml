[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "am-i-blocked-adapters"
version = "0.1.0"
description = "Vendor adapters for am-i-blocked"
requires-python = ">=3.12"
dependencies = [
    "am-i-blocked-core",
    "httpx>=0.27",
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["am_i_blocked_adapters"]
